spring.application.name=product-embedding-search
server.port=8080
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/${MYSQL_DATABASE:product_embedding_search}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

embedding.server.url=${EMBEDDING_SERVER_URL:http://localhost:8000}
